        hvac_mode: heat
  mode: single
- id: 'ankomst_reset_default_tidspunkt'
  alias: Ankomst – sett standard ankomsttidspunkt ved oppstart
  description: ''
  triggers:
    - platform: homeassistant
      event: start
  conditions:
    - condition: template
      value_template: >
        {% set dt = states('input_datetime.ankomst_tidspunkt') %}
        {% set status = states('input_select.hytte_status') %}
        {{ status != 'ankommet'
           and (dt in ['unknown','unavailable'] or as_datetime(dt) < now()) }}
  actions:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ankomst_tidspunkt
      data:
        datetime: >
          {% set days = ((4 - now().weekday()) % 7) or 7 %}
          {{ (now().date() + timedelta(days=days)).strftime('%Y-%m-%d') }} 19:00:00
    - action: input_select.select_option
      target:
        entity_id: input_select.hytte_status
      data:
        option: ledig
  mode: single
- id: 'ankomst_tid_passert'
  alias: Ankomst – sett status til ankommet ved ankomsttidspunkt
  description: ''
  triggers:
    - platform: time
      at: input_datetime.ankomst_tidspunkt
  conditions:
    - condition: state
      entity_id: input_select.hytte_status
      state: planlagt
  actions:
    - action: input_select.select_option
      target:
        entity_id: input_select.hytte_status
      data:
        option: ankommet
  mode: single
