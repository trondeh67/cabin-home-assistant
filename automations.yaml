- id: '1755152263990'
  alias: Low battery level detection & notification for all battery sensors
  description: ''
  use_blueprint:
    path: sbyx/low-battery-level-detection-notification-for-all-battery-sensors.yaml
    input:
      threshold: 40
      day: 1
      exclude:
        entity_id:
          - sensor.sm_s928b_battery_level
      actions:
      - action: notify.notify
        metadata: {}
        data:
          title: Lavt batterinivå
          message: >
            {% set threshold = 40 %}
            {% set excluded = ['sensor.sm_s928b_battery_level'] %}
            {% set ns = namespace(lines=[]) %}
            {% for state in states.sensor | selectattr('attributes.device_class', '==', 'battery') %}
              {% if 0 <= state.state | int(-1) < threshold and state.entity_id not in excluded %}
                {% set area = area_name(state.entity_id) %}
                {% set ns.lines = ns.lines + [state.name ~ ': ' ~ state.state ~ ' %' ~ (' (' ~ area ~ ')' if area else '')] %}
              {% endif %}
            {% endfor %}
            {{ ns.lines | join('\n') }}
      - action: persistent_notification.create
        data:
          title: Lavt batterinivå
          message: >
            {% set threshold = 40 %}
            {% set excluded = ['sensor.sm_s928b_battery_level'] %}
            {% set ns = namespace(lines=[]) %}
            {% for state in states.sensor | selectattr('attributes.device_class', '==', 'battery') %}
              {% if 0 <= state.state | int(-1) < threshold and state.entity_id not in excluded %}
                {% set area = area_name(state.entity_id) %}
                {% set ns.lines = ns.lines + [state.name ~ ': ' ~ state.state ~ ' %' ~ (' (' ~ area ~ ')' if area else '')] %}
              {% endif %}
            {% endfor %}
            {{ ns.lines | join('\n') }}
