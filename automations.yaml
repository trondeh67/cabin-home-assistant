- id: '1755095587104'
  alias: Skru på lys i bod
  description: ''
  triggers:
  - entity_id: binary_sensor.bod_dorkontakt_contact
    to: 'on'
    trigger: state
  actions:
  - target:
      area_id: bod
    action: light.turn_on
  - delay: 00:05:00
  - repeat:
      count: 3
      sequence:
      - target:
          area_id: bod
        action: light.turn_off
      - delay: '00:00:0.3'
      - target:
          area_id: bod
        action: light.turn_on
      - delay: '00:00:0.3'
  - delay: 00:00:30
  - target:
      area_id: bod
    action: light.turn_off
  mode: restart
