title: TJUKKTØMMERN
views:
  - !include oppholdsrom.yaml

  - title: Stue
    path: stue
    icon: mdi:sofa
    cards:
      - type: custom:mushroom-title-card
        title: STUE
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: LYSSCENER & LYS
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Max
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.stue_max
              - type: custom:mushroom-template-card
                primary: Dag
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.stue_dag
              - type: custom:mushroom-template-card
                primary: Kveld
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.stue_dempet
              - type: custom:mushroom-template-card
                primary: Av
                icon: mdi:lightbulb-off
                icon_color: red

                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.stue_alt_av

          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-light-card
                entity: light.stue_leselampe_venstre
                show_brightness_control: false
                collapsible_controls: false
              - type: custom:mushroom-light-card
                entity: light.stue_leselampe_hoyre
                show_brightness_control: false
                collapsible_controls: false
              - type: custom:mushroom-light-card
                entity: light.led_stue_butterfly
                show_brightness_control: true
                collapsible_controls: false
              - type: custom:mushroom-light-card
                entity: light.stue_5x_spott
                show_brightness_control: true
                collapsible_controls: false
              - type: custom:mushroom-light-card
                entity: light.lampe_ved_ovn
                show_brightness_control: false
                collapsible_controls: false
              - type: custom:mushroom-light-card
                entity: light.lys_rundt_tv
                show_brightness_control: true
                collapsible_controls: false

  - title: Spisestue
    path: spisestue
    icon: mdi:silverware-fork-knife
    cards:
      - type: custom:mushroom-title-card
        title: SPISESTUE
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: LYSSCENER & LYS
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Max
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.spisestue_max
              - type: custom:mushroom-template-card
                primary: Dag
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.spisestue_dag
              - type: custom:mushroom-template-card
                primary: Kveld
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.spisestue_dempet
              - type: custom:mushroom-template-card
                primary: Av
                icon: mdi:lightbulb-off
                icon_color: red

                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.spisestue_av

          - type: grid
            columns: 1
            square: false
            cards:
              - type: custom:auto-entities
                card:
                  type: grid
                  columns: 2
                  square: false
                card_param: cards
                filter:
                  include:
                    - area: Spisestue
                      domain: light
                      options:
                        type: custom:mushroom-light-card
                        show_brightness_control: true
                show_empty: false

  - title: Kjøkken
    path: kjokken
    icon: mdi:countertop-outline
    cards:
      - type: custom:mushroom-title-card
        title: KJØKKEN
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: LYSSCENER & LYS
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Max
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.kjokken_max
              - type: custom:mushroom-template-card
                primary: Dag
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.kjokken_dag
              - type: custom:mushroom-template-card
                primary: Kveld
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.kjokken_dempet
              - type: custom:mushroom-template-card
                primary: Av
                icon: mdi:lightbulb-off
                icon_color: red
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.kjokken_av

      - type: custom:auto-entities
        card:
          type: grid
          columns: 2
          square: false
        card_param: cards
        filter:
          include:
            - area: Kjøkken
              domain: light
              options:
                type: custom:mushroom-light-card
                show_brightness_control: true
        show_empty: false
  - title: Bad
    path: bad
    icon: mdi:shower
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: BAD
          - type: custom:mushroom-title-card
            title: Lys
          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - area: Bad
                  domain: light
                  options:
                    type: custom:mushroom-light-card
                    show_brightness_control: true
                    use_light_color: true
            show_empty: false
          - type: custom:mushroom-title-card
            title: Ventilasjon
          - type: custom:mushroom-template-card
            entity: switch.rele_vifte_aktuator
            primary: Avtrekksvifte
            secondary: >-
              {{ 'På' if is_state('switch.rele_vifte_aktuator', 'on') else 'Av' }}
            icon: mdi:fan
            icon_color: >-
              {{ 'blue' if is_state('switch.rele_vifte_aktuator', 'on') else 'grey' }}
            tap_action:
              action: toggle
  - title: Soverom
    path: soverom
    icon: mdi:bed-king
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Soverom 1
          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - area: Soverom 1
                  domain: light
                  options:
                    type: custom:mushroom-light-card
                    show_brightness_control: true
            show_empty: false
          - type: custom:mushroom-title-card
            title: Soverom 2
          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - area: Soverom 2
                  domain: light
                  options:
                    type: custom:mushroom-light-card
                    show_brightness_control: true
            show_empty: false
          - type: custom:mushroom-title-card
            title: Soverom 3
          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - area: Soverom 3
                  domain: light
                  options:
                    type: custom:mushroom-light-card
                    show_brightness_control: true
            show_empty: false
  - title: Vaskerom
    path: vaskerom
    icon: mdi:washing-machine
    cards:
      - type: custom:mushroom-title-card
        title: Vaskerom
      - type: custom:auto-entities
        card:
          type: grid
          columns: 2
          square: false
