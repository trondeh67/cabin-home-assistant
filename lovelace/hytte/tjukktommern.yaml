        show_empty: false
  - title: Gang
    path: gang
    icon: mdi:walk
    cards:
      - type: custom:mushroom-title-card
        title: Gang
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: LYSSCENER & LYS
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Max
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.gang_max
              - type: custom:mushroom-template-card
                primary: Dag
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.gang_dag
              - type: custom:mushroom-template-card
                primary: Kveld
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.gang_dempet
              - type: custom:mushroom-template-card
                primary: Av
                icon: mdi:lightbulb-off
                icon_color: red
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.gang_av

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.dimmer_gang_1_dimmeaktuator
            name: Taklys oppe
            show_brightness_control: true
            collapsible_controls: false
          - type: custom:mushroom-light-card
            entity: light.dimmer_gang_2_dimmeaktuator
            name: Taklys nede
            show_brightness_control: true
            collapsible_controls: false
          - type: custom:mushroom-light-card
            entity: light.maleribelysning
            name: Maleribelysning
            show_brightness_control: false
            collapsible_controls: false

  - title: Vindfang
    path: vindfang
    icon: mdi:hanger
    cards:
      - type: custom:mushroom-title-card
        title: Vindfang
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: LYSSCENER & LYS
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: Max
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.vindfang_max
              - type: custom:mushroom-template-card
                primary: Dag
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.vindfang_dag
              - type: custom:mushroom-template-card
                primary: Kveld
                icon: mdi:lightbulb-group
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.vindfang_dempet
              - type: custom:mushroom-template-card
                primary: Av
                icon: mdi:lightbulb-off
                icon_color: red
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.vindfang_av

      - type: custom:auto-entities
        card:
          type: grid
          columns: 2
