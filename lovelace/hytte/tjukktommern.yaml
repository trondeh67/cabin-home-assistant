  - title: Bod
    path: bod
    icon: mdi:door-closed
    cards:
      - type: custom:mushroom-title-card
        title: Bod
      - type: custom:auto-entities
        card:
          type: grid
          columns: 2
          square: false
        card_param: cards
        filter:
          include:
            - area: Bod
              domain: light
              options:
                type: custom:mushroom-light-card
                show_brightness_control: false
                options:
        # KLIMA
      - type: custom:mushroom-title-card
        title: Klima
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.bod_temperaturmaler_temperature') | float(none) | round(1) }}°C"
            secondary: Temperaturmåler
            icon: mdi:thermometer
            tap_action:
              action: more-info
              entity: sensor.bod_temperaturmaler_temperature
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.bod_temperatur') | float(none) | round(1) }}°C"
            secondary: Verisure
            icon: mdi:thermometer
            tap_action:
              action: more-info
              entity: sensor.bod_temperatur
  - title: Utendørs
    path: utendørs
    icon: mdi:sun-snowflake-variant
    cards:
      - type: custom:mushroom-title-card
        title: Utendørs
      - type: custom:auto-entities
        card:
          type: grid
          columns: 2
          square: false
        card_param: cards
        filter:
          include:
            - area: Utendørs
              domain: light
              options:
                type: custom:mushroom-light-card
                show_brightness_control: false
            - area: Utendørs
              domain: switch
              options:
                type: custom:mushroom-light-card
                show_brightness_control: false
                icon: mdi:lightbulb
                #layout: vertical
                #tap_action:
                #  action: toggle
        show_empty: false

  - !include temperatur_innstillinger.yaml
