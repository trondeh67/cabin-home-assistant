lys_alt_av:
  alias: Lys – alt av (robust m/xComfort)
  mode: single
  sequence:
  - variables:
      alle_lys: '{{ states.light | map(attribute=''entity_id'') | list }}'
      xcomfort_lys: "{{ states.light\n   | selectattr('entity_id','match','^light\\\\.xc_')\n
        \  | map(attribute='entity_id') | list }}\n"
      andre_lys: '{{ alle_lys | reject(''in'', xcomfort_lys) | list }}'
  - if:
    - condition: template
      value_template: '{{ andre_lys | length > 0 }}'
    then:
    - action: homeassistant.turn_off
      target:
        entity_id: '{{ andre_lys }}'
      data:
        transition: 1
  - repeat:
      for_each: '{{ xcomfort_lys }}'
      sequence:
      - variables:
          lys: '{{ repeat.item }}'
      - action: light.turn_off
        target:
          entity_id: '{{ lys }}'
      - wait_template: '{{ is_state(lys, ''off'') }}'
        timeout: 00:00:02
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ not is_state(lys, ''off'') }}'
          sequence:
          - action: light.turn_on
            target:
              entity_id: '{{ lys }}'
            data:
              brightness: 0
          - wait_template: '{{ is_state(lys,''off'') or (state_attr(lys,''brightness'')|int(1))
              == 0 }}'
            timeout: 00:00:02
            continue_on_timeout: true
      - if:
        - condition: template
          value_template: '{{ not is_state(lys, ''off'') }}'
        then:
        - action: light.turn_off
          target:
            entity_id: '{{ lys }}'
        - delay: 00:00:01
  - variables:
      fortsatt_pa: "{{ expand(xcomfort_lys) | selectattr('state','eq','on')\n   |
        map(attribute='entity_id') | list }}\n"
  - if:
    - condition: template
      value_template: '{{ fortsatt_pa | length > 0 }}'
    then:
    - action: persistent_notification.create
      data:
        title: Lys – xComfort-lyser fortsatt på!
        message: '{{ fortsatt_pa | join('', '') }}'
lys_dagtid_avskrudd_alarm:
  alias: Lys – dagtid/avskrudd alarm
  mode: single
  sequence:
  - target:
      entity_id:
      - scene.gang_dag
      - scene.kjokken_dag
      - scene.stue_dag
      - scene.spisestue_dag
      - scene.vindfang_dag
    action: scene.turn_on
    data: {}
lys_oppholdsom_dempet:
  alias: Lys – oppholdsom dempet
  mode: single
  sequence:
  - target:
      entity_id:
      - scene.gang_dempet
      - scene.kjokken_dempet
      - scene.stue_dempet
      - scene.spisestue_dempet
      - scene.vindfang_dempet
    action: scene.turn_on
    data: {}
  description: ''
forlat_hytta:
  alias: Forlat hytta
  mode: single
  sequence:
    - action: google_assistant_sdk.send_text_command
      data:
        command: "set gang to eco mode"
    - delay: "00:00:03"
    - action: google_assistant_sdk.send_text_command
      data:
        command: "set bad to eco mode"
    - delay: "00:00:03"
    - action: google_assistant_sdk.send_text_command
      data:
        command: "set vaskerom to eco mode"
    - delay: "00:00:03"
    - action: google_assistant_sdk.send_text_command
      data:
        command: "set bereder to off"
    - action: climate.set_temperature
      target:
        entity_id: climate.daikinap86694
      data:
        temperature: "{{ states('input_number.forlat_daikin_temp') | float(16) }}"
        hvac_mode: heat
    - action: climate.set_temperature
      target:
        entity_id:
          - climate.stue_hoyre
          - climate.stue_venstre
      data:
        temperature: "{{ states('input_number.forlat_mill_temp') | float(12) }}"
        hvac_mode: heat
    - action: input_select.select_option
      target:
        entity_id: input_select.hytte_status
      data:
        option: ledig
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ankomst_tidspunkt
      data:
        datetime: >
          {% set days = ((4 - now().weekday()) % 7) or 7 %}
          {{ (now().date() + timedelta(days=days)).strftime('%Y-%m-%d') }} 19:00:00
