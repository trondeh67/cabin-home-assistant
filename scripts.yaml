        command: "set gang to comfort mode"
    - delay: "00:00:03"
    - action: google_assistant_sdk.send_text_command
      data:
        command: "set bad to comfort mode"
    - delay: "00:00:03"
    - action: google_assistant_sdk.send_text_command
      data:
        command: "set vaskerom to comfort mode"
    - delay: "00:00:03"
    - action: google_assistant_sdk.send_text_command
      data:
        command: "set bereder to on"
    - action: climate.set_temperature
      target:
        entity_id: climate.daikinap86694
      data:
        temperature: "{{ states('input_number.ankomst_daikin_temp') | float(22) }}"
        hvac_mode: heat
    - action: climate.set_temperature
      target:
        entity_id:
          - climate.stue_hoyre
