      data:
        option: ankommet
planlegg_ankomst:
  alias: Planlegg ankomst
  mode: single
  sequence:
    - variables:
        timer_til: >
          {{ ((state_attr('input_datetime.ankomst_tidspunkt', 'timestamp') - now().timestamp()) / 3600) }}
        vp_timer: "{{ states('input_number.ankomst_varmepumpe_timer') | float }}"
        sk_timer: "{{ states('input_number.ankomst_sikom_timer') | float }}"
        ml_timer: "{{ states('input_number.ankomst_mill_timer') | float }}"

    # Avvis planlegging dersom ankomsttidspunkt er i fortiden
    - if:
        - condition: template
          value_template: "{{ timer_til | float <= 0 }}"
      then:
        - action: notify.mobile_app_sm_s928b
          data:
            title: Ugyldig ankomsttidspunkt
            message: Ankomsttidspunkt er i fortiden. Velg et fremtidig tidspunkt og prøv igjen.
        - action: persistent_notification.create
          data:
            title: Ugyldig ankomsttidspunkt
            message: Ankomsttidspunkt er i fortiden. Velg et fremtidig tidspunkt og prøv igjen.
    - condition: template
      value_template: "{{ timer_til | float > 0 }}"

    # Varmepumpe: start nå hvis kortere tid enn offset, ellers planlegg
    - if:
        - condition: template
          value_template: "{{ timer_til | float < vp_timer | float }}"
      then:
        - action: climate.set_temperature
          target:
            entity_id: climate.daikinap86694
          data:
            temperature: "{{ states('input_number.ankomst_daikin_temp') | float(22) }}"
            hvac_mode: heat
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ankomst_varmepumpe_start
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      else:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ankomst_varmepumpe_start
          data:
            datetime: >
              {{ (as_datetime(states('input_datetime.ankomst_tidspunkt'))
                  - timedelta(hours=vp_timer | float)).strftime('%Y-%m-%d %H:%M:%S') }}

    # Sikom: start nå hvis kortere tid enn offset, ellers planlegg
    - if:
        - condition: template
          value_template: "{{ timer_til | float < sk_timer | float }}"
      then:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ankomst_sikom_start
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: google_assistant_sdk.send_text_command
          data:
            command: "set gang to comfort mode"
        - delay: "00:00:03"
        - action: google_assistant_sdk.send_text_command
          data:
            command: "set bad to comfort mode"
        - delay: "00:00:03"
        - action: google_assistant_sdk.send_text_command
          data:
            command: "set vaskerom to comfort mode"
        - delay: "00:00:03"
        - action: google_assistant_sdk.send_text_command
          data:
            command: "set bereder to on"
      else:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ankomst_sikom_start
          data:
            datetime: >
              {{ (as_datetime(states('input_datetime.ankomst_tidspunkt'))
                  - timedelta(hours=sk_timer | float)).strftime('%Y-%m-%d %H:%M:%S') }}

    # Mill: start nå hvis kortere tid enn offset, ellers planlegg
    - if:
        - condition: template
          value_template: "{{ timer_til | float < ml_timer | float }}"
      then:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ankomst_mill_start
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
        - action: climate.set_temperature
          target:
            entity_id:
              - climate.stue_hoyre
              - climate.stue_venstre
          data:
            temperature: "{{ states('input_number.ankomst_mill_temp') | float(18) }}"
            hvac_mode: heat
      else:
        - action: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ankomst_mill_start
          data:
            datetime: >
              {{ (as_datetime(states('input_datetime.ankomst_tidspunkt'))
                  - timedelta(hours=ml_timer | float)).strftime('%Y-%m-%d %H:%M:%S') }}

    - action: input_select.select_option
      target:
        entity_id: input_select.hytte_status
      data:
        option: planlagt
    - action: persistent_notification.create
      data:
        title: Ankomst planlagt
        message: >
          {% set a = as_datetime(states('input_datetime.ankomst_tidspunkt')) %}
          Ankomst: {{ a.strftime('%d.%m kl %H:%M') }}
          Varmepumpe: {{ 'startet nå' if timer_til | float < vp_timer | float else (a - timedelta(hours=vp_timer | float)).strftime('%d.%m kl %H:%M') }}
          Sikom: {{ 'startet nå' if timer_til | float < sk_timer | float else (a - timedelta(hours=sk_timer | float)).strftime('%d.%m kl %H:%M') }}
          Mill: {{ 'startet nå' if timer_til | float < ml_timer | float else (a - timedelta(hours=ml_timer | float)).strftime('%d.%m kl %H:%M') }}
